<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lost & Found Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Loading Screen -->
    <div
      id="loading-screen"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      "
    >
      <div style="text-align: center">
        <p style="font-size: 24px">&#128270;</p>
        <p>Loading...</p>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal-container" class="hidden"></div>

    <!-- Login Page -->
    <div id="login-page">
      <div class="login-wrapper">
        <div class="login-card">
          <div class="login-header">
            <div class="logo-icon">&#128270;</div>
            <h1>Lost &amp; Found</h1>
            <p>Management System</p>
          </div>
          <div class="login-body">
            <!-- Tabs -->
            <div class="login-tabs">
              <button class="login-tab active" id="tab-login">Sign In</button>
              <button class="login-tab" id="tab-register">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login-form">
              <div id="login-alert"></div>
              <form id="form-login">
                <div class="form-group">
                  <label for="login-username">Username</label>
                  <input
                    type="text"
                    id="login-username"
                    class="form-control"
                    placeholder="Enter your username"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="login-password">Password</label>
                  <input
                    type="password"
                    id="login-password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                  Sign In
                </button>
              </form>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="hidden">
              <div id="register-alert"></div>
              <form id="form-register">
                <div class="form-group">
                  <label for="reg-fullname">Full Name</label>
                  <input
                    type="text"
                    id="reg-fullname"
                    class="form-control"
                    placeholder="Enter your full name"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="reg-username">Username</label>
                  <input
                    type="text"
                    id="reg-username"
                    class="form-control"
                    placeholder="Choose a username"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="reg-password">Password</label>
                  <input
                    type="password"
                    id="reg-password"
                    class="form-control"
                    placeholder="At least 6 characters"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="reg-confirm">Confirm Password</label>
                  <input
                    type="password"
                    id="reg-confirm"
                    class="form-control"
                    placeholder="Re-enter your password"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                  Create Account
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main App Page -->
    <div id="app-page" class="hidden">
      <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <h2>&#128270; Lost &amp; Found</h2>
            <div class="subtitle">Management System</div>
          </div>

          <nav class="sidebar-nav">
            <div class="nav-section-title">Main</div>
            <div class="nav-item active" data-page="dashboard">
              <span class="nav-icon">&#127968;</span>
              <span>Dashboard</span>
            </div>
            <div class="nav-item" data-page="all-items">
              <span class="nav-icon">&#128196;</span>
              <span>All Items</span>
            </div>
            <div class="nav-item" data-page="my-reports">
              <span class="nav-icon">&#128203;</span>
              <span>My Reports</span>
            </div>

            <div class="nav-section-title">Report</div>
            <div class="nav-item" data-page="report-lost">
              <span class="nav-icon">&#128270;</span>
              <span>Report Lost Item</span>
            </div>
            <div class="nav-item" data-page="report-found">
              <span class="nav-icon">&#9989;</span>
              <span>Report Found Item</span>
            </div>

            <!-- Admin Only -->
            <div id="admin-nav-section" class="hidden">
              <div class="nav-section-title">Administration</div>
              <div class="nav-item" data-page="admin-manage">
                <span class="nav-icon">&#9881;&#65039;</span>
                <span>Manage Items</span>
              </div>
              <div class="nav-item" data-page="admin-users">
                <span class="nav-icon">&#128101;</span>
                <span>Manage Users</span>
              </div>
            </div>
          </nav>

          <div class="sidebar-footer">
            <div class="user-info">
              <div class="user-avatar" id="user-avatar">AD</div>
              <div class="user-details">
                <div class="user-name" id="user-name">Admin</div>
                <div class="user-role" id="user-role">admin</div>
              </div>
              <button class="btn-logout" id="btn-logout" title="Logout">
                &#9211;
              </button>
            </div>
          </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
          <header class="topbar">
            <div class="topbar-left">
              <button class="menu-toggle" id="menu-toggle">&#9776;</button>
              <h1 class="page-title" id="page-title">Dashboard</h1>
            </div>
            <div class="topbar-right">
              <span class="text-muted" id="current-date"></span>
            </div>
          </header>

          <div class="content-area" id="content-area">
            <!-- Rendered by app.js -->
          </div>
        </div>
      </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/items.js"></script>
    <script src="js/app.js"></script>

    <script>
      var dateEl = document.getElementById("current-date");
      if (dateEl) {
        dateEl.textContent = new Date().toLocaleDateString();
      }
    </script>
  </body>
</html>
